<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculate</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-weight: 600;
    }
    body{
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(45deg, #0a0a0a, #3a4452);
    }

    .calculator{
      border: 1px solid #717377;
      border-radius: 16px;
      padding: 20px;
      background: transparent;
      box-shadow: 0px 3px 15px rgba(113, 115, 119, 0.5);
    }

    input{
      width: 320px;
      border: none;
      padding: 24px;
      margin: 10px;
      background: transparent;
      font-size: 40px;
      text-align: right;
      cursor: pointer;
      color: white;
    }
    input::placeholder{
      color: white;
    }

    button{
      height: 60px;
      width: 60px;
      margin: 10px;
      border-radius: 50%;
      background: transparent;
      color: white;
      font-size: 18px;
      box-shadow: -8px -8px 15px rgba(255, 255, 255, 0.1);
      cursor: pointer;
    }

    .equal{
      background-color: rgb(76, 0, 255);
    }
    .operator{
      background-color: rgb(81, 183, 79);
    }
  </style>
</head>
<body>
  <div class="calculator">
    <input type="text" placeholder="0" id="input">
    <div>
      <button class="operator">AC</button>
      <button class="operator">DEL</button>
      <button class="operator">%</button>
      <button class="operator">/</button>
    </div>
    <div>
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operator">*</button>
    </div>
    <div>
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operator">-</button>
    </div>
    <div>
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operator">+</button>
    </div>
    <div>
      <button>00</button>
      <button>0</button>
      <button>.</button>
      <button class="equal">=</button>
    </div>
  </div>
  <script src="ap.js"></script>
</body>
</html>
